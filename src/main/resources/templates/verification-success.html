<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Compte activé</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .success {
            font-size: 50px;
            color: #28a745;
        }

        h1 {
            margin-top: 10px;
            color: #333;
        }

        p {
            color: #666;
        }

        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #4facfe;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .btn:hover {
            background: #00c6ff;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="success">✔</div>
    <h1>Compte activé !</h1>
    <p>Votre compte a été activé avec succès.</p>

    <p style="margin-top: 15px; font-size: 14px; color: #888;">
        Vous pouvez maintenant accéder à votre espace en toute sécurité.
    </p>

</div>

</body>
</html>
